name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # ── Unit tests (Linux) ─────────────────────────────────
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage-linux.txt ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux
          path: coverage-linux.txt

  # ── Unit tests (Windows) ───────────────────────────────
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Run tests
        shell: bash
        run: go test -v -race -count=1 -coverprofile=coverage-windows.txt ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows
          path: coverage-windows.txt

  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: windows-latest
    needs: [lint, test-linux, test-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          $env:CGO_ENABLED = "0"
          go build -ldflags "-s -w" -o dist/wslwatch.exe ./cmd/wslwatch

      - name: Verify binary runs
        run: dist/wslwatch.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslwatch-windows-amd64
          path: dist/wslwatch.exe

  # ── Vet & format check ─────────────────────────────────
  vet:
    name: Vet & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
